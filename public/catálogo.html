<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nutri+Vida</title>
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="stylesheet" href="catálogo.css" />
</head>

<body>
    <menu>
        <img src="favicon.png" alt="Logo" class="icon" onclick="login()">
        <h1>Nutri+Vida</h1>
    </menu>
    <br>
    <header>
        <h1>Catálogo/Produtos</h1>
    </header>

    <main>
        <section>
            <h2>Nossos Produtos</h2>
            <div id="lista-produtos"></div>
        </section>
    </main>

    <!-- BOTÃO FLUTUANTE -->
    <button id="carrinho-btn" onclick="toggleCarrinho()">
        🛒 Carrinho
        <span id="carrinho-count">0</span>
    </button>

    <!-- PAINEL DO CARRINHO (abre ao clicar no botão) -->
    <div id="carrinho-painel">
        <div id="carrinho-painel-header">
            <h3>🛒 Meu Carrinho</h3>
            <button id="btn-fechar-carrinho" onclick="fecharCarrinho()">✕</button>
        </div>

        <div id="carrinho-vazio">Seu carrinho está vazio 🌿</div>
        <div id="itens-carrinho"></div>

        <div id="carrinho-painel-footer" style="display:none">
            <p id="carrinho-total">Total: R$ 0.00</p>
            <button id="btn-finalizar">Finalizar Pedido →</button>
        </div>
    </div>

    <!-- TOAST de feedback -->
    <div class="toast" id="toast"></div>

    <div id="sair">
        <button id="btn-sair" onclick="Voltar()">Voltar para Loja</button>
    </div>

    <script src="catálogo.js"></script>
    <script src="admin.js"></script>
</body>
</html>
