<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin - Nutri+Vida</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="admin.css">
    <link rel="stylesheet" href="catálogo.css" />
</head>
<body>
<menu>
    <img src="logo.png" alt="Logo" class="icon">
    <h1>Painel Admin</h1>
</menu>
<br>
<header>
    <h1>⚙️ Administração</h1>
</header>

<main>
    <!-- Cadastrar Produto -->
    <section id="secao-cadastro">
        <h2>Cadastrar Produto</h2>
        <div class="formulario">
            <input type="text" id="nome" placeholder="Nome do produto">
            <input type="number" id="preco" placeholder="Preço (ex: 10.50)" step="0.01">
            <input type="text" id="descricao" placeholder="Descrição">
            <input type="number" id="estoque" placeholder="Estoque">

            <label>⚖️ Venda por:</label>
            <select id="unidade" style="padding:10px;border:2px solid #ddd;border-radius:8px;font-size:1rem">
                <option value="unidade">📦 Unidade (peça) — preço por unidade</option>
                <option value="grama">⚖️ Peso (gramas) — preço por 100g</option>
            </select>

            <label>Foto do produto:</label>
            <input type="file" id="foto" accept="image/*" title="Foto do produto">
            <button onclick="cadastrarProduto()">+ Cadastrar Produto</button>
            <p id="msg-cadastro"></p>
        </div>
    </section>

    <!-- Lista de Produtos -->
    <section id="secao-produtos">
        <h2>Produtos Cadastrados</h2>
        <div id="lista-admin"></div>
    </section>

    <!-- Pedidos -->
    <section id="secao-pedidos">
        <h2>Pedidos Recebidos</h2>
        <div id="lista-pedidos"></div>
    </section>
</main>

<div id="sair">
    <button id="btn-sair" onclick="sair()">Sair</button>
</div>

<script src="painel.js"></script>
</body>
</html>
