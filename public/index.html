<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nutri+Vida</title>
    <link rel="icon" type="image/png" href="logo.png" />
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <!-- ===== TELA DE BOAS-VINDAS (overlay completo) ===== -->
    <div id="tela-boas-vindas">
        <div class="boas-vindas-container">
            <div class="boas-vindas-box">
                <img src="logo.png" alt="Logo Nutri+Vida" class="bv-logo">
                <h1 class="bv-titulo">Nutri<span class="bv-plus">+</span>Vida</h1>
                <p class="bv-subtitulo">Produtos naturais com qualidade e carinho</p>
                
                <div class="bv-divisor"></div>
                
                <p class="bv-descricao">
                    Bem-vindo à nossa loja! Aqui você encontra os melhores produtos naturais, 
                    selecionados especialmente para sua saúde e bem-estar.
                </p>

                <div class="bv-features">
                    <div class="bv-feature">
                        <span class="bv-icon">🍃</span>
                        <span>100% Natural</span>
                    </div>
                    <div class="bv-feature">
                        <span class="bv-icon">🚚</span>
                        <span>Entrega Rápida</span>
                    </div>
                    <div class="bv-feature">
                        <span class="bv-icon">💚</span>
                        <span>Qualidade Garantida</span>
                    </div>
                </div>

                <button class="bv-btn" onclick="entrar()">
                    🌿 Entrar na Loja
                </button>
                
                <p class="bv-rodape">Entrega e retirada disponíveis em Altinho-PE</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
